name = "xvc-agent2"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Free account hard limit is 50 subrequests — config cannot exceed this.
# Paid accounts can go up to 10,000,000.
# https://developers.cloudflare.com/workers/wrangler/configuration/#limits
[limits]
subrequests = 50

[[d1_databases]]
binding = "DB"
database_name = "xvc-agent2"
database_id = "0ee12134-09c7-496a-9013-ed3128aae3c2"

[[r2_buckets]]
binding = "FILES"
bucket_name = "xvc-agent2-files"

[assets]
directory = "./public"
binding = "ASSETS"

[triggers]
crons = ["*/5 * * * *"]
